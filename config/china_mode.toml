# =============================================================================
# SeeSea 中国模式配置
# China Mode Configuration for SeeSea
# =============================================================================
# 
# 本配置文件定义了在中国大陆地区可访问的搜索引擎
# This configuration file defines search engines accessible from mainland China
#
# 注意：根据实际测试，只有以下引擎在中国大陆稳定可用
# Note: Based on actual testing, only the following engines are reliably accessible in mainland China
# =============================================================================

[china_mode]
# 是否启用中国模式
enabled = true

# 中国模式描述
description = "中国模式 - 仅启用在中国大陆可访问的搜索引擎"

# 中国可访问的引擎列表
# Engines accessible from mainland China
accessible_engines = [
    # 搜索引擎 - Search Engines
    "bing",              # Bing - 微软必应 (在中国可访问)
    "bing images",       # Bing 图片
    "bing news",         # Bing 新闻  
    "bing videos",       # Bing 视频
    
    "360search",         # 360搜索 (中国本土)
    "360search videos",  # 360搜索视频
    
    # 开发工具 - Development Tools
    "github",            # GitHub (在中国可访问，但可能不稳定)
    "github code",       # GitHub 代码搜索
    "stackoverflow",     # Stack Overflow (在中国可访问)
]

# 在中国被墙的引擎 (已禁用)
# Blocked engines in China (disabled)
blocked_engines = [
    "duckduckgo",        # DuckDuckGo - 被墙
    "brave",             # Brave Search - 被墙
    "startpage",         # Startpage - 被墙
    "wikipedia",         # Wikipedia - 被墙
    "wikidata",          # Wikidata - 被墙
    "unsplash",          # Unsplash - 被墙
]

# 引擎优先级配置
[china_mode.engine_priorities]
# 中国本土引擎优先级最高
"360search" = 1.5

# 国际可访问引擎
bing = 1.0

# 开发工具
github = 1.0
stackoverflow = 1.0

# 区域配置
[china_mode.region_config]
location = "CN"
preferred_languages = ["zh", "zh-CN", "en"]
timezone = "Asia/Shanghai"

# DNS 配置 - 使用国内 DNS
preferred_dns = [
    "https://dns.alidns.com/dns-query",      # 阿里云
    "https://doh.pub/dns-query",              # 腾讯 DNSPod
    "https://doh.360.cn/dns-query",           # 360 DoH
]

# 网络配置
[china_mode.network]
# 延长超时时间以应对网络波动
request_timeout = 45
connect_timeout = 15
max_retries = 4
retry_strategy = "exponential_backoff"

# 缓存配置
[china_mode.cache]
enabled = true
ttl = 7200           # 2小时缓存
max_size_mb = 2048

# 说明
[china_mode.notes]
description = """
中国模式说明：

可用引擎 (9个):
1. Bing 系列 (4个) - 通用搜索、图片、新闻、视频
2. 360搜索 (2个) - 通用搜索、视频
3. GitHub (2个) - 代码仓库、代码搜索
4. Stack Overflow (1个) - 开发问答

不可用引擎 (在中国被墙):
- DuckDuckGo 系列 - 被墙
- Brave 系列 - 被墙  
- Startpage 系列 - 被墙
- Wikipedia - 被墙
- Wikidata - 被墙
- Unsplash - 被墙
"""
