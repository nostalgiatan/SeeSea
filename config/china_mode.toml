# =============================================================================
# SeeSea 中国模式配置
# China Mode Configuration for SeeSea
# =============================================================================
# 
# 本配置文件定义了在中国大陆地区可访问的搜索引擎列表
# This configuration file defines the list of search engines accessible from mainland China
#
# 总计: 65 个真正可访问的搜索引擎
# Total: 65 truly accessible search engines
#
# 主要包括:
# - 中国本土搜索引擎 (Baidu, 360search, Sogou, ChinaSo, Bilibili, Acfun)
# - 国际可访问引擎 (Bing, Yandex, Qwant)
# - 学术研究平台 (ArXiv, PubMed, Semantic Scholar, etc.)
# - 开发技术平台 (GitHub, Stack Overflow, PyPI, Docker Hub, etc.)
# - 地图服务 (OpenStreetMap, Photon)
# - 其他工具服务 (Currency converter, Weather, Translation, etc.)
#
# 注意: 已排除在中国被墙的服务 (Google, Wikipedia, YouTube, Twitter, Facebook等)
# Note: Blocked services in China have been excluded (Google, Wikipedia, YouTube, Twitter, Facebook, etc.)
# =============================================================================

[china_mode]
# 是否启用中国模式
enabled = true

# 中国模式描述
description = "中国模式 - 仅启用在中国大陆可访问的搜索引擎 (65个真实可用引擎)"

# 核心搜索引擎 (19个)
# Core search engines (19 engines)
core_search_engines = [
    # 主要搜索引擎
    "yandex",           # Yandex - Russian search engine, accessible in China
    "bing",             # Bing - Microsoft search, accessible in China
    "baidu",            # 百度 - China's largest search engine
    "sogou",            # 搜狗 - Chinese search engine
    "360search",        # 360搜索 - Chinese search engine
    
    # 图片/视频搜索
    "yandex images",    # Yandex 图片
    "yandex music",     # Yandex 音乐
    "bing images",      # Bing 图片
    "bing news",        # Bing 新闻
    "bing videos",      # Bing 视频
    "baidu images",     # 百度图片
    "baidu kaifa",      # 百度开发者搜索
    "sogou images",     # 搜狗图片
    "sogou videos",     # 搜狗视频
    "sogou wechat",     # 搜狗微信搜索
    "360search videos", # 360搜索视频
    "chinaso news",     # 中国搜索新闻
    "chinaso images",   # 中国搜索图片
    "chinaso videos",   # 中国搜索视频
]

# 学术研究平台 (8个)
# Academic/Research platforms (8 engines)
academic_engines = [
    "arxiv",                    # ArXiv - Preprint repository
    "pubmed",                   # PubMed - Medical research
    "semantic scholar",         # Semantic Scholar
    "crossref",                 # Crossref - DOI registration
    "openairedatasets",         # OpenAIRE Datasets
    "openairepublications",     # OpenAIRE Publications
    "pdbe",                     # Protein Data Bank Europe
    "astrophysics data system", # ADS - Astrophysics papers
]

# 开发技术平台 (7个)
# Development/Tech platforms (7 engines)
development_engines = [
    "github",           # GitHub - Code hosting
    "github code",      # GitHub Code Search
    "stackoverflow",    # Stack Overflow
    "pypi",             # Python Package Index
    "docker hub",       # Docker Hub
    "crates.io",        # Rust crates
    "mdn",              # MDN Web Docs
]

# 中国视频平台 (2个)
# Chinese video platforms (2 engines)
video_engines = [
    "bilibili",         # 哔哩哔哩
    "acfun",            # AcFun
]

# 地图位置服务 (2个)
# Map/Location services (2 engines)
map_engines = [
    "openstreetmap",    # OpenStreetMap
    "photon",           # Photon geocoder
]

# 工具服务 (6个)
# Utility services (6 engines)
utility_engines = [
    "currency",             # Currency converter
    "wttr.in",              # Weather
    "mymemory translated",  # Translation
    "dictzone",             # Dictionary
    "wordnik",              # Word definitions
    "etymonline",           # Etymology
]

# 其他服务 (21个)
# Other services (21 engines)
other_engines = [
    "qwant",                    # Qwant search
    "qwant images",             # Qwant images
    "qwant news",               # Qwant news
    "qwant videos",             # Qwant videos
    "askubuntu",                # Ask Ubuntu
    "superuser",                # Super User
    "arch linux wiki",          # Arch Linux Wiki
    "alpine linux packages",    # Alpine packages
    "gentoo",                   # Gentoo packages
    "anaconda",                 # Anaconda packages
    "hoogle",                   # Haskell search
    "mankier",                  # Man pages
    "annas archive",            # Anna's Archive
    "ansa",                     # ANSA news
    "reuters",                  # Reuters news
    "apk mirror",               # APK Mirror
    "bandcamp",                 # Bandcamp music
    "radio browser",            # Radio Browser
    "tootfinder",               # Mastodon search
    "chefkoch",                 # Recipe search
    "genius",                   # Lyrics
]

# 引擎优先级配置 (用于结果排序)
# Engine priority configuration (for result ranking)
[china_mode.engine_priorities]
# 中国本土引擎优先级较高
baidu = 1.5
"360search" = 1.4
sogou = 1.3
chinaso = 1.2
bilibili = 1.2
acfun = 1.1

# 国际可访问引擎
bing = 1.0
yandex = 1.0
qwant = 0.8

# 专业搜索引擎
github = 1.2
stackoverflow = 1.1
arxiv = 1.1
pubmed = 1.1

# 区域特定配置
[china_mode.region_config]
# 地理位置
location = "CN"
# 首选语言
preferred_languages = ["zh", "zh-CN", "en"]
# 时区
timezone = "Asia/Shanghai"
# DNS 服务器 (优先使用国内 DNS)
preferred_dns = [
    "https://dns.alidns.com/dns-query",      # 阿里云
    "https://doh.pub/dns-query",              # 腾讯 DNSPod
    "https://doh.360.cn/dns-query",           # 360 DoH
]

# 网络配置
[china_mode.network]
# 请求超时 (秒) - 考虑到网络状况，适当延长
request_timeout = 45
# 连接超时 (秒)
connect_timeout = 15
# 最大重试次数
max_retries = 4
# 重试延迟策略
retry_strategy = "exponential_backoff"

# 缓存配置 (中国模式下建议启用缓存以提高性能)
[china_mode.cache]
# 启用缓存
enabled = true
# 缓存 TTL (秒) - 延长缓存时间
ttl = 7200
# 最大缓存大小 (MB)
max_size_mb = 2048

# 被墙的服务列表 (已自动禁用)
[china_mode.blocked_services]
# 这些服务在中国被墙，已从引擎列表中排除
blocked = [
    "google", "google images", "google news", "google scholar", "google videos",
    "youtube",
    "duckduckgo",
    "startpage", "startpage images", "startpage news",
    "brave", "brave.images", "brave.news", "brave.videos",
    "wikipedia", "wikidata", "wiktionary", "wikinews",
    "wikimedia commons",
    "twitter", "facebook", "reddit", "pinterest",
    "vimeo", "dailymotion",
    "soundcloud", "mixcloud",
    "flickr", "deviantart", "unsplash", "openverse",
    "yahoo", "yahoo news",
    "torrent sites", "bt4g", "piratebay", "kickass", "1337x",
    "mastodon", "lemmy",
    "sepiasearch",
    "podcastindex",
    "lingva",
]
